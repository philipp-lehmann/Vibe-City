<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌃 Vibe City</title>
  <!-- 🌃 🌆 🏙️ 🌉 🌁 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/ui.css">
</head>

<body>
  <div id="app">
    <canvas id="view"></canvas>

    <!-- ===== STATUS BAR ===== -->
    <div id="statusbar">
      <div id="statusbar-left">
        <button id="btn-saves">Menu</button>
        <button id="btn-newgame">New City</button>
      </div>
      <div id="statusbar-center">
        <span id="s-name" title="Click to rename">New Terminus</span>
        <span class="grp" title="Click to play/pause"><span class="lbl">Date</span> <b id="s-date">January 1900</b></span>
        <!-- STATISTICS: each stat owns its own trend sparkline; clicking the label opens the Statistics panel -->
        <span class="grp"><span class="lbl" data-stats-trigger="population">Population</span> <b id="s-pop">0</b><canvas
            class="spark" id="spark-pop" width="36" height="16"></canvas></span>
        <span class="grp"><span class="lbl" data-stats-trigger="funds">Funds</span> <b id="s-funds">$50,000</b><canvas
            class="spark" id="spark-funds" width="36" height="16"></canvas></span>
        <span class="grp"><span class="lbl" data-stats-trigger="happyness">Happyness</span> <b
            id="s-happy">70</b><canvas class="spark" id="spark-happy" width="36"
            height="16"></canvas></span><!-- DEMAND SYSTEM -->
      </div>
      <div id="statusbar-right"> </div>
    </div>

    <!-- ===== NOTIFICATION CENTRE ===== -->
    <div id="notif-center">
      <div id="notif-header">
        <span class="ttl">Messages</span>
        <span id="notif-badge"></span>
        <span id="notif-arrow" class="panel-icon">▾</span>
      </div>
      <div id="notif-body">
        <div id="notif-persistent"></div>
        <div id="notif-log"></div>
      </div>
    </div>

    <!-- ===== STATISTICS PANEL ===== -->
    <!-- STATISTICS: a bigger combined sparkline — each row's checkbox shows/hides its line on #stats-chart -->
    <div id="stats-panel">
      <div id="stats-head" class="stats-head">
        <span class="ttl">Statistics</span>
        <span id="stats-close" title="Close" class="panel-icon">✕</span>
      </div>
      <canvas id="stats-chart" width="400" height="200"></canvas>
      <div class="stat-row" data-stat="pop">
        <input type="checkbox" class="stat-toggle" id="stat-toggle-pop">
        <span class="stat-swatch" style="background:var(--stat-pop)"></span>
        <span class="stat-lbl">Population</span>
        <span class="stat-val" id="stat-pop">0</span>
        <span class="stat-delta" id="stat-pop-delta">+0</span>
      </div>
      <div class="stat-row" data-stat="happiness">
        <input type="checkbox" class="stat-toggle" id="stat-toggle-happiness">
        <span class="stat-swatch" style="background:var(--stat-happiness)"></span>
        <span class="stat-lbl">Happiness</span>
        <span class="stat-val" id="stat-happy">70</span>
        <span class="stat-delta" id="stat-happy-delta">+0</span>
      </div>
      <div class="stat-row" data-stat="funds">
        <input type="checkbox" class="stat-toggle" id="stat-toggle-funds">
        <span class="stat-swatch" style="background:var(--stat-funds)"></span>
        <span class="stat-lbl">Funds</span>
        <span class="stat-val" id="stat-funds">$50,000</span>
        <span class="stat-delta" id="stat-funds-delta">+$0</span>
      </div>
      <label class="stats-autopause-row">
        <input type="checkbox" id="stats-autopause">
        <span>Pause game while shown</span>
      </label>
    </div>

    <!-- ===== LEFT PANEL ===== -->
    <div id="left-panel">
      <div class="ap-section">
        <div class="ap-header"><span>Tools</span><span class="ap-arrow panel-icon">▴</span></div>
        <div class="ap-body open">
          <div class="ap-inner" id="tool-body"></div>
        </div>
      </div>
      <div class="ap-section">
        <div class="ap-header"><span>Terrain</span><span class="ap-arrow panel-icon">▴</span></div>
        <div class="ap-body open">
          <div class="ap-inner" id="terrain-body"></div>
        </div>
      </div>
      <div class="ap-section">
        <div class="ap-header"><span>Demand</span><span class="ap-arrow panel-icon">▴</span></div>
        <div class="ap-body open">
          <div class="ap-inner">
            <div class="drow"><span class="dlab" style="color:#7caa6b">R</span>
              <div class="dtrack">
                <div class="dmid"></div>
                <div class="dfill" id="dem-R"></div>
              </div>
            </div>
            <div class="drow"><span class="dlab" style="color:#8a5cf6">C</span>
              <div class="dtrack">
                <div class="dmid"></div>
                <div class="dfill" id="dem-C"></div>
              </div>
            </div>
            <div class="drow"><span class="dlab" style="color:#d9a72c">I</span>
              <div class="dtrack">
                <div class="dmid"></div>
                <div class="dfill" id="dem-I"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== PLAYBACK PANEL (bottom-right, left of minimap) ===== -->
    <div id="playback">
      <div class="pb-row">
        <button id="btn-pause">⏸</button>
        <button id="btn-speed" class="hug">▶▶</button>
      </div>
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div id="admin-panel">
      <div class="ap-section" id="ap-admin">
        <div class="ap-header"><span>Admin</span><span class="ap-arrow panel-icon">▾</span></div>
        <div class="ap-body">
          <div class="ap-inner">
            <div id="taxbox">
              <label>Tax rate <b id="tax-val">8%</b></label>
              <input id="tax-slider" type="range" min="1" max="20" value="8">
            </div>
            <!-- GAME MODE: only shown/visible in Scenario Mode -->
            <button id="btn-contracts" style="display:none;" class="admin">Contracts</button>
            <!-- CREDITS: available in any mode, opens the loan-offers dialog -->
            <button id="btn-loans" class="admin">Loans</button>
          </div>
        </div>
      </div>
      <div class="ap-section">
        <div class="ap-header"><span>Events</span><span class="ap-arrow panel-icon">▾</span></div>
        <div class="ap-body">
          <div class="ap-inner">
            <button class="btn-danger" id="btn-fire">Ignite Fire</button>
          </div>
        </div>
      </div>
      <div class="ap-section">
        <div class="ap-header"><span>Help</span><span class="ap-arrow panel-icon">▾</span></div>
        <div class="ap-body">
          <div class="ap-inner">
            <div class="hint">L-click place · R-click bulldoze<br>drag to paint · wheel zoom · Q/E rotate</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== INSPECTOR ===== -->
    <div id="inspector">
      <div class="insp-header">
        <div class="ttl">Inspector</div>
        <span id="insp-close" class="panel-icon" title="Close">✕</span>
      </div>
      <div id="insp-body">Hover a tile…</div>
    </div>

    <!-- ===== MINIMAP ===== -->
    <div id="minimap-wrap">
      <canvas id="minimap" width="120" height="120"></canvas>

      <div class="pb-row">
        <button id="btn-rot-l">⤷</button>
        <span id="s-face">N</span>
        <button id="btn-rot-r">⤶</button>
      </div>
      <div class="pb-row">
        <button id="btn-zoom">Fit</button>
      </div>
    </div>
  </div>

  </div>

  <!-- ES module entry point; type=module auto-defers until DOM is parsed -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
