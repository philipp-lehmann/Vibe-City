<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICROPOLIS // CRT City Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>
<div id="app">
  <canvas id="view"></canvas>

  <!-- ===== STATUS BAR ===== -->
  <div id="statusbar">
    <button id="btn-saves">Vibe City</button>
    <button id="btn-newgame">New City</button>
    |
    <span id="s-name">New Terminus</span>
    <span class="grp"><span class="lbl">Date</span> <b id="s-date">January 1900</b></span>
    <span class="grp"><span class="lbl">Population</span> <b id="s-pop">0</b></span>
    <span class="grp"><span class="lbl">Funds</span> <b id="s-funds">$50,000</b></span>
    <span class="grp"><span class="lbl">Happyness</span> <b id="s-happy">70</b></span><!-- DEMAND SYSTEM -->
    
  </div>

  <!-- ===== NOTIFICATION CENTRE ===== -->
  <div id="notif-center">
    <div id="notif-header">
      <span class="ttl">Messages</span>
      <span id="notif-badge"></span>
      <span id="notif-arrow">▾</span>
    </div>
    <div id="notif-body">
      <div id="notif-persistent"></div>
      <div id="notif-log"></div>
    </div>
  </div>

  <!-- ===== TOOLBAR (buttons injected by ui.js) ===== -->
  <div id="toolbar">
    <div class="ttl">Tools</div>
  </div>

  <!-- ===== DEMAND ===== -->
  <div id="demand">
    <div class="ttl">Demand</div>
    <div class="drow"><span class="dlab" style="color:#7caa6b">R</span>
      <div class="dtrack"><div class="dmid"></div><div class="dfill" id="dem-R"></div></div></div>
    <div class="drow"><span class="dlab" style="color:#8a5cf6">C</span>
      <div class="dtrack"><div class="dmid"></div><div class="dfill" id="dem-C"></div></div></div>
    <div class="drow"><span class="dlab" style="color:#d9a72c">I</span>
      <div class="dtrack"><div class="dmid"></div><div class="dfill" id="dem-I"></div></div></div>
  </div>

  <!-- ===== PLAYBACK PANEL (bottom-right, left of minimap) ===== -->
  <div id="playback">
    <div id="paused">Running</div>
    <button id="btn-pause">⏸ Pause [space]</button>
    <button id="btn-speed">Speed: Normal</button>
    <button id="btn-zoom">Zoom: 1x</button>
    <div class="rot-row">
      <button id="btn-rot-l">⟲ [Q]</button>
      <button id="btn-rot-r">⟳ [E]</button>
    </div>
  </div>

  <!-- ===== CONTROLS ===== -->
  <div id="controls">
    <!-- DEMAND SYSTEM: tax rate slider (budget control) -->
    <div id="taxbox">
      <label>TAX RATE <b id="tax-val">8%</b></label>
      <input id="tax-slider" type="range" min="1" max="20" value="8">
    </div>
    <button class="disaster" id="btn-fire">Ignite Fire</button>
    <div class="hint">L-click place · R-click bulldoze<br>drag to paint · wheel zoom · Q/E rotate</div>
  </div>

  <!-- ===== INSPECTOR ===== -->
  <div id="inspector">
    <div class="ttl">Inspector</div>
    <div id="insp-body">Hover a tile…</div>
  </div>

  <!-- ===== MINIMAP ===== -->
  <div id="minimap-wrap">
    <div class="ttl">Map</div>
    <span id="s-face" class="grp"></span>
    <canvas id="minimap" width="112" height="112"></canvas>
  </div>

</div>

<!-- ES module entry point; type=module auto-defers until DOM is parsed -->
<script type="module" src="js/main.js"></script>
</body>
</html>
